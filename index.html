<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuscaFarma</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: white;
  padding: 12px 15px;
  display: flex;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.logo {
  color: #2ecc71;
  font-size: 20px;
  font-weight: bold;
}

.btn-anunciar {
  background: #2ecc71;
  color: white;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.banner {
  height: 120px;
  background: linear-gradient(90deg, #2ecc71, #27ae60);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.container {
  padding: 15px;
}

.search-box {
  background: white;
  border-radius: 30px;
  display: flex;
  padding: 12px;
  margin-top: -20px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

.search-box input {
  flex: 1;
  border: none;
}

.search-box button {
  background: #2ecc71;
  border: none;
  color: white;
  border-radius: 50%;
  width: 40px;
  height: 40px;
}

/* CARD */
.card {
  background: white;
  border-radius: 14px;
  margin-top: 12px;
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.card img {
  width: 70px;
  height: 70px;
  object-fit: contain;
}

.info {
  flex: 1;
}

.price {
  color: #27ae60;
  font-weight: bold;
}

.badge {
  background: #ff4757;
  color: white;
  padding: 3px 6px;
  border-radius: 6px;
  font-size: 11px;
  display: block;
  margin-top: 4px;
}

.patrocinado {
  background: #f1c40f;
  color: white;
  padding: 3px 6px;
  border-radius: 6px;
  font-size: 11px;
  display: block;
  margin-top: 4px;
}

.btn {
  background: #2ecc71;
  color: white;
  padding: 8px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 13px;
}

/* PLANOS */
.planos {
  padding: 15px;
}

.plano {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.plano h3 {
  margin: 0;
}

.preco {
  font-size: 20px;
  color: #2ecc71;
  font-weight: bold;
  margin-top: 5px;
}

/* 🔥 NOVO ESPAÇAMENTO DO BOTÃO */
.plano .btn {
  display: block;
  margin-top: 15px; /* AQUI resolve o problema */
  text-align: center;
  padding: 10px;
}

.voltar {
  margin-bottom: 10px;
  display: inline-block;
  cursor: pointer;
  color: #2ecc71;
}
</style>
</head>

<body>

<header>
  <div class="logo">BuscaFarma</div>
  <div class="btn-anunciar" onclick="abrirPlanos()">Anunciar</div>
</header>

<div class="banner">
  Encontre o melhor preço 💊
</div>

<div class="container">

  <div class="search-box">
    <input type="text" id="search" placeholder="Buscar remédio...">
    <button onclick="buscar()">🔍</button>
  </div>

  <div id="resultados"></div>

</div>

<script>
const produtos = [
  {nome:"Dipirona 500mg", preco:5.99, farmacia:"Farmácia Central", img:"dipirona.jpg", patrocinado:true},
  {nome:"Dipirona 500mg", preco:4.99, farmacia:"Farmácia Popular", img:"dipirona.jpg"},

  {nome:"Dorflex", preco:11.50, farmacia:"Drogaria Saúde", img:"dorflex.jpg", patrocinado:true},
  {nome:"Dorflex", preco:13.20, farmacia:"Farmácia Popular", img:"dorflex.jpg"},

  {nome:"Paracetamol 750mg", preco:5.90, farmacia:"Drogaria Saúde", img:"paracetamol.jpg"},
  {nome:"Paracetamol 750mg", preco:7.50, farmacia:"Farmácia Popular", img:"paracetamol.jpg"}
];

function buscar(){
  const termo = document.getElementById("search").value.toLowerCase();
  const resultados = document.getElementById("resultados");

  let filtrados = produtos.filter(p => p.nome.toLowerCase().includes(termo));

  const patrocinados = filtrados.filter(p => p.patrocinado);
  const normais = filtrados.filter(p => !p.patrocinado).sort((a,b)=>a.preco-b.preco);

  filtrados = [...patrocinados, ...normais];

  resultados.innerHTML = "";

  if(filtrados.length === 0){
    resultados.innerHTML = `<p style="text-align:center;color:gray;">Nenhum resultado</p>`;
    return;
  }

  filtrados.forEach((p,index)=>{
    const card = document.createElement("div");
    card.className="card";

    card.innerHTML = `
      <img src="${p.img}" onerror="this.src='https://via.placeholder.com/100'">
      <div class="info">
        <strong>${p.nome}</strong>
        ${p.patrocinado ? '<span class="patrocinado">Patrocinado</span>' : ''}
        ${!p.patrocinado && index===patrocinados.length ? '<span class="badge">🔥 Melhor preço</span>' : ''}
        <div class="price">R$ ${p.preco.toFixed(2)}</div>
        <small>${p.farmacia}</small>
      </div>
      <a class="btn" target="_blank"
        href="https://wa.me/?text=Quero ${p.nome}">
        Comprar
      </a>
    `;

    resultados.appendChild(card);
  });
}

function abrirPlanos(){
  const resultados = document.getElementById("resultados");

  resultados.innerHTML = `
    <div class="planos">
      <div class="voltar" onclick="buscar()">⬅ Voltar</div>

      <h2>Planos para Farmácias</h2>

      <div class="plano">
        <h3>Plano Essencial</h3>
        <p>Aparece na busca</p>
        <div class="preco">Grátis</div>
      </div>

      <div class="plano">
        <h3>Plano Destaque</h3>
        <p>Fica no topo + mais cliques</p>
        <div class="preco">R$29,90/mês</div>

        <a class="btn" target="_blank"
        href="https://wa.me/?text=Quero anunciar no plano destaque">
        Quero anunciar
        </a>
      </div>

    </div>
  `;
}

buscar();
</script>

</body>
</html>
