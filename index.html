<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuscaFarma</title>

<style>
body {margin:0;font-family:Arial;background:#f5f5f5;}
header {background:#2ecc71;padding:15px;color:white;font-size:22px;font-weight:bold;}
.container {padding:15px;}
.search-box {background:white;border-radius:12px;display:flex;padding:10px;margin-top:10px;}
.search-box input {flex:1;border:none;padding:10px;}
.card {background:white;border-radius:12px;padding:10px;margin-top:10px;display:flex;gap:10px;}
.card img {width:80px;height:80px;border-radius:10px;}
.price {color:#27ae60;font-weight:bold;}
</style>
</head>

<body>

<header>BuscaFarma</header>

<div class="container">
  <div class="search-box">
    <input type="text" id="search" placeholder="Buscar remédio...">
  </div>

  <div id="resultados"></div>
</div>

<script>
const produtos = [
  {nome:"Dipirona 500mg", preco:4.99, farmacia:"Farmácia A", img:"imagens/dipirona.jpg"},
  {nome:"Dipirona 500mg", preco:5.99, farmacia:"Farmácia B", img:"imagens/dipirona.jpg"},
  {nome:"Dipirona 500mg", preco:6.49, farmacia:"Farmácia C", img:"imagens/dipirona.jpg"},

  {nome:"Dorflex", preco:11.50, farmacia:"Farmácia A", img:"imagens/dorflex.jpg"},
  {nome:"Dorflex", preco:12.99, farmacia:"Farmácia B", img:"imagens/dorflex.jpg"},
  {nome:"Dorflex", preco:13.20, farmacia:"Farmácia C", img:"imagens/dorflex.jpg"},

  {nome:"Eno", preco:7.99, farmacia:"Farmácia A", img:"imagens/eno.jpg"},
  {nome:"Eno", preco:8.50, farmacia:"Farmácia B", img:"imagens/eno.jpg"},
  {nome:"Eno", preco:9.00, farmacia:"Farmácia C", img:"imagens/eno.jpg"}
];

function buscar(){
  const termo = document.getElementById("search").value.toLowerCase();
  const resultados = document.getElementById("resultados");
  resultados.innerHTML = "";

  const filtrados = produtos.filter(p => p.nome.toLowerCase().includes(termo));
  filtrados.sort((a,b)=>a.preco-b.preco);

  filtrados.forEach(p=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <img src="${p.img}">
      <div>
        <h4>${p.nome}</h4>
        <p class="price">R$ ${p.preco}</p>
        <p>${p.farmacia}</p>
      </div>
    `;
    resultados.appendChild(div);
  });
}

document.getElementById("search").addEventListener("input", buscar);
</script>

</body>
</html>
