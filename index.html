<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuscaFarma</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: white;
  padding: 12px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.logo {
  color: #2ecc71;
  font-size: 20px;
  font-weight: bold;
}

.btn-anunciar {
  background: #2ecc71;
  color: white;
  padding: 8px 14px;
  border-radius: 20px;
  text-decoration: none;
  font-size: 14px;
  font-weight: bold;
}

.banner {
  height: 120px;
  background: linear-gradient(90deg, #2ecc71, #27ae60);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.container {
  padding: 15px;
}

.search-box {
  background: white;
  border-radius: 30px;
  display: flex;
  padding: 12px;
  margin-top: -20px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

.search-box input {
  flex: 1;
  border: none;
  font-size: 16px;
}

.search-box button {
  background: #2ecc71;
  border: none;
  color: white;
  border-radius: 50%;
  width: 40px;
  height: 40px;
}

.card {
  background: white;
  border-radius: 14px;
  margin-top: 12px;
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.card img {
  width: 70px;
  height: 70px;
  object-fit: contain;
}

.info {
  flex: 1;
}

.price {
  color: #27ae60;
  font-weight: bold;
  font-size: 18px;
  margin-top: 5px;
}

.badge, .patrocinado {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 12px;
  margin-top: 6px;
}

.badge {
  background: #ff4757;
  color: white;
}

.patrocinado {
  background: #f1c40f;
  color: white;
}

.btn {
  background: #2ecc71;
  color: white;
  padding: 8px 10px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 13px;
}

/* 🔥 BOTÃO INSTALAR */
.btn-install {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #2ecc71;
  color: white;
  padding: 12px 18px;
  border-radius: 30px;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  display: none;
  z-index: 999;
}
</style>
</head>

<body>

<header>
  <div class="logo">BuscaFarma</div>

  <a class="btn-anunciar" target="_blank"
     href="https://wa.me/5522981495667?text=Olá,%20quero%20anunciar">
     Anunciar
  </a>
</header>

<div class="banner">
  Encontre o melhor preço 💊
</div>

<div class="container">

  <div class="search-box">
    <input type="text" id="search" placeholder="Digite o nome do remédio...">
    <button id="btnBuscar">🔍</button>
  </div>

  <div id="resultados"></div>

</div>

<!-- 🔥 BOTÃO INSTALAR -->
<button id="btnInstall" class="btn-install">📲 Instalar App</button>

<script>
// 🔥 INSTALL PWA
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  document.getElementById("btnInstall").style.display = "block";
});

document.getElementById("btnInstall").addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById("btnInstall").style.display = "none";
  }
});

// PRODUTOS
const produtos = [
  {nome:"Dipirona 500mg", preco:5.99, farmacia:"Farmácia Central", img:"dipirona.jpg", patrocinado:true},
  {nome:"Dipirona 500mg", preco:6.49, farmacia:"Drogaria Saúde", img:"dipirona.jpg"},
  {nome:"Dipirona 500mg", preco:4.99, farmacia:"Farmácia Popular", img:"dipirona.jpg"}
];

function buscar(){
  const termo = document.getElementById("search").value.toLowerCase();
  const resultados = document.getElementById("resultados");

  let filtrados = produtos.filter(p => p.nome.toLowerCase().includes(termo));

  resultados.innerHTML = "";

  filtrados.forEach((p, index) => {
    resultados.innerHTML += `
      <div class="card">
        <img src="${p.img}" onerror="this.src='https://via.placeholder.com/100'">
        <div class="info">
          <strong>${p.nome}</strong><br>
          ${p.patrocinado ? '<div class="patrocinado">⭐ Patrocinado</div>' : ''}
          ${index === 0 ? '<div class="badge">🔥 Melhor preço</div>' : ''}
          <div class="price">R$ ${p.preco.toFixed(2)}</div>
          <small>${p.farmacia}</small>
        </div>
      </div>
    `;
  });
}

document.getElementById("search").addEventListener("input", buscar);
document.getElementById("btnBuscar").addEventListener("click", buscar);

buscar();
</script>

</body>
</html>
